<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL BP 助手 - 模拟 Ban/Pick</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bp.css">
</head>
<body>

<div id="app" class="app">
    <header class="top-bar">
        <div class="brand">
            <span class="brand-icon">&#9876;</span>
            <span class="brand-text">CHAMPION SELECT</span>
        </div>
        <nav class="top-nav">
            <a href="index.html" class="nav-link">随机组队</a>
            <a href="bp.html" class="nav-link active">BP 助手</a>
        </nav>
    </header>

    <!-- 设置面板（选边 + 分路） -->
    <section class="bp-setup" id="bp-setup">
        <h2 class="section-title">BP 模拟设置</h2>
        <div class="setup-row">
            <span class="setup-label">你是哪一边？</span>
            <div class="side-btns">
                <button class="side-btn blue-side active" onclick="setSide('blue')">
                    <span class="side-icon">&#9650;</span> 蓝色方（先选）
                </button>
                <button class="side-btn red-side" onclick="setSide('red')">
                    <span class="side-icon">&#9660;</span> 红色方（后选）
                </button>
            </div>
        </div>
        <div class="setup-row">
            <span class="setup-label">你的分路</span>
            <div class="setup-lanes" id="setup-lanes"></div>
        </div>
        <div class="setup-row">
            <button class="start-bp-btn" onclick="startBP()">开始 BP</button>
        </div>
    </section>

    <!-- BP 流程面板 -->
    <section class="bp-flow" id="bp-flow" style="display:none">
        <!-- 顶部 Ban 区 -->
        <div class="bp-ban-bar">
            <div class="ban-group blue-bans" id="blue-bans"></div>
            <div class="ban-divider">BAN</div>
            <div class="ban-group red-bans" id="red-bans"></div>
        </div>

        <!-- 中间选人区 -->
        <div class="bp-pick-area">
            <div class="pick-column blue-column">
                <h3 class="col-title blue-title">蓝色方</h3>
                <div class="pick-list" id="blue-picks"></div>
            </div>
            <div class="pick-center">
                <div class="phase-info" id="phase-info">Ban 阶段</div>
                <div class="step-info" id="step-info"></div>
                <div class="step-actions" id="step-actions"></div>
                <!-- 推荐区 -->
                <div class="rec-section" id="rec-section" style="display:none">
                    <h4 class="rec-title">推荐选择</h4>
                    <div class="rec-list" id="rec-list"></div>
                </div>
                <div class="rec-section" id="ban-rec-section" style="display:none">
                    <h4 class="rec-title">推荐 Ban</h4>
                    <div class="rec-list" id="ban-rec-list"></div>
                </div>
            </div>
            <div class="pick-column red-column">
                <h3 class="col-title red-title">红色方</h3>
                <div class="pick-list" id="red-picks"></div>
            </div>
        </div>

        <!-- 底部操作 -->
        <div class="bp-bottom-bar">
            <button class="bp-ctrl-btn" onclick="undoStep()">&#8592; 撤销</button>
            <button class="bp-ctrl-btn" onclick="resetBP()">重置 BP</button>
        </div>
    </section>

    <!-- 英雄选择器弹窗 -->
    <div class="champ-picker-overlay" id="champ-picker" style="display:none">
        <div class="champ-picker-panel">
            <div class="picker-header">
                <h3 class="picker-title" id="picker-title">选择英雄</h3>
                <input type="text" class="picker-search" id="picker-search" placeholder="搜索英雄..." oninput="filterPicker()">
                <button class="picker-close" onclick="closePicker()">&times;</button>
            </div>
            <div class="picker-lane-filter" id="picker-lane-filter"></div>
            <div class="picker-grid" id="picker-grid"></div>
        </div>
    </div>
</div>

<script src="champions.js"></script>
<script src="meta.js"></script>
<script src="bp.js"></script>
</body>
</html>
