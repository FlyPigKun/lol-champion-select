<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL 英雄随机组队 - 选到什么玩什么</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 开场动画 -->
<div id="intro" class="intro">
    <div class="intro-inner">
        <svg class="intro-sword" viewBox="0 0 60 120" width="50" height="100">
            <polygon points="30,0 36,70 30,80 24,70" fill="#c8aa6e"/>
            <polygon points="15,68 45,68 45,74 15,74" fill="#a0844e"/>
            <polygon points="26,74 34,74 32,100 28,100" fill="#785a28"/>
        </svg>
        <div class="intro-title">CHAMPION SELECT</div>
        <div class="intro-sub">选到什么玩什么</div>
    </div>
</div>

<!-- 主页面 -->
<div id="app" class="app">
    <header class="top-bar">
        <div class="brand">
            <span class="brand-icon">&#9876;</span>
            <span class="brand-text">CHAMPION SELECT</span>
        </div>
        <nav class="top-nav">
            <a href="index.html" class="nav-link active">随机组队</a>
            <a href="bp.html" class="nav-link">BP 助手</a>
        </nav>
    </header>

    <!-- 队伍编辑区 -->
    <section class="team-setup">
        <h2 class="section-title">组建队伍</h2>
        <div class="team-slots" id="team-slots">
            <!-- JS 动态生成 -->
        </div>
        <div class="team-actions">
            <button class="add-player-btn" id="add-player-btn" onclick="addPlayer()">
                <span>+</span> 添加队员
            </button>
        </div>
    </section>

    <!-- 开始抽选 -->
    <section class="roll-section">
        <button class="roll-btn" id="roll-btn" onclick="rollTeam()">
            <span class="roll-icon">&#9876;</span>
            随机抽选阵容
        </button>
    </section>

    <!-- 结果展示 -->
    <section class="result-section" id="result-section" style="display:none">
        <h2 class="section-title">阵容结果</h2>
        <div class="result-cards" id="result-cards"></div>
        <div class="result-actions">
            <button class="reroll-btn" onclick="rollTeam()">重新抽选</button>
        </div>
    </section>

    <!-- 英雄图鉴 -->
    <section class="roster-section">
        <div class="roster-header">
            <h2 class="section-title">英雄图鉴 <span id="roster-count" class="count-badge"></span></h2>
            <div class="roster-controls">
                <div class="filter-group" id="filter-group">
                    <button class="filter-btn active" data-role="all" onclick="filterRole('all')">全部</button>
                    <button class="filter-btn" data-role="fighter" onclick="filterRole('fighter')">战士</button>
                    <button class="filter-btn" data-role="tank" onclick="filterRole('tank')">坦克</button>
                    <button class="filter-btn" data-role="mage" onclick="filterRole('mage')">法师</button>
                    <button class="filter-btn" data-role="assassin" onclick="filterRole('assassin')">刺客</button>
                    <button class="filter-btn" data-role="marksman" onclick="filterRole('marksman')">射手</button>
                    <button class="filter-btn" data-role="support" onclick="filterRole('support')">辅助</button>
                </div>
                <input type="text" id="search-input" class="search-input" placeholder="搜索英雄..." oninput="renderRoster()">
            </div>
        </div>
        <div id="roster-grid" class="roster-grid"></div>
    </section>
</div>

<script src="champions.js"></script>
<script src="app.js"></script>
</body>
</html>
